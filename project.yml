name: PeekBar
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  preGenCommand: bash scripts/sync-local-signing.sh

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.6.4

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"

targets:
  PeekBar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: PeekBar
        excludes:
          - Resources/Info.plist
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imekachi.PeekBar
        INFOPLIST_FILE: PeekBar/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: 0.2.1
        MARKETING_VERSION: 0.2.1
    configFiles:
      Debug: Signing.xcconfig.example
      Release: Signing.xcconfig.example

  PeekBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - PeekBarTests
    dependencies:
      - target: PeekBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imekachi.PeekBarTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PeekBar:
    build:
      targets:
        PeekBar: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PeekBarTests
